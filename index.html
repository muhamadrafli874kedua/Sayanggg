<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semoga Lekas Membaik 💖</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff0f5;
    font-family: Georgia, serif;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 2;
  }

  .click-btn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: #f4c0d1;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    font-size: 14px;
    color: #4B1528;
    font-weight: 500;
    transition: transform 0.15s ease, background 0.2s;
    user-select: none;
    gap: 8px;
  }
  .click-btn:hover { transform: scale(1.07); background: #ed93b1; }
  .click-btn:active { transform: scale(0.94); }
  .click-btn .icon { font-size: 46px; line-height: 1; }
  .hint { font-family: sans-serif; font-size: 14px; color: #c47a95; }

  .message-box {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
  }
  .message-box.show { display: flex; }

  .heart-big {
    font-size: 80px;
    animation: heartbeat 1.1s ease infinite;
    display: block;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.28); }
    28% { transform: scale(1.1); }
    42% { transform: scale(1.22); }
  }

  .msg-text {
    font-family: Georgia, serif;
    font-size: 28px;
    font-weight: bold;
    color: #D4537E;
    line-height: 1.4;
    animation: fadeUp 0.7s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .sub-text {
    font-family: sans-serif;
    font-size: 15px;
    color: #993556;
    animation: fadeUp 0.9s 0.2s ease forwards;
    opacity: 0;
  }

  .again-btn {
    margin-top: 8px;
    background: none;
    border: 1.5px solid #ed93b1;
    color: #993556;
    border-radius: 99px;
    padding: 10px 28px;
    font-size: 14px;
    cursor: pointer;
    font-family: sans-serif;
    transition: background 0.15s;
    animation: fadeUp 1s 0.4s ease forwards;
    opacity: 0;
  }
  .again-btn:hover { background: #FBEAF0; }

  .particle {
    position: absolute;
    pointer-events: none;
    font-size: 24px;
    animation: floatUp 2.2s ease forwards;
    z-index: 1;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-220px) scale(0.4) rotate(20deg); }
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="btn-wrap" id="btnWrap">
    <button class="click-btn" id="mainBtn" onclick="reveal()">
      <span class="icon">🌸</span>
      <span>Klik aku dungs</span>
    </button>
    <span class="hint">ada pesan buat kamu ✨</span>
  </div>

  <div class="message-box" id="msgBox">
    <span class="heart-big">💖</span>
    <p class="msg-text">Semoga lekas membaik, sayang.</p>
    <p class="sub-text">Cepat sembuhh pusingnyaaa 🌷</p>
    <button class="again-btn" onclick="reset()">Lihat lagi </button>
  </div>
</div>

<script>
const emojis = ['🌸','✨','💕','🌷','⭐','💖','🌼','🍀','💗','🎀'];

function spawnParticles() {
  const scene = document.getElementById('scene');
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const p = document.createElement('span');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = (5 + Math.random() * 90) + '%';
      p.style.bottom = (5 + Math.random() * 40) + '%';
      p.style.fontSize = (16 + Math.random() * 18) + 'px';
      p.style.animationDuration = (1.5 + Math.random() * 1.2) + 's';
      scene.appendChild(p);
      setTimeout(() => p.remove(), 2800);
    }, i * 80);
  }
}

function reveal() {
  document.getElementById('btnWrap').style.display = 'none';
  document.getElementById('msgBox').classList.add('show');
  spawnParticles();
}

function reset() {
  document.getElementById('msgBox').classList.remove('show');
  document.getElementById('msgBox').querySelectorAll('.msg-text, .sub-text, .again-btn').forEach(el => {
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = '';
  });
  document.getElementById('btnWrap').style.display = 'flex';
}
</script>
</body>
</html>
